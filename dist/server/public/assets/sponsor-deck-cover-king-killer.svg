<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 405" role="img" aria-labelledby="title desc">
  <title id="title">Mike King Killer Heckert sponsorship deck cover</title>
  <desc id="desc">Fight sponsorship deck cover for Mike King Killer Heckert with BKFC record, knockouts, and Instagram audience.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f18"/>
      <stop offset="1" stop-color="#171d29"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="720" height="405" fill="url(#bg)"/>
  <path d="M452 0h268v405H300z" fill="#111722" opacity=".62"/>
  <path d="M38 48h642v1.5H38z" fill="#2a3242"/>
  <text x="36" y="56" fill="#ff2338" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="9">FIGHT SPONSORSHIP DECK · 2026</text>
  <text x="36" y="127" fill="#f7f8fb" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="49" font-weight="900">MIKE</text>
  <text x="173" y="127" fill="#ff1630" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="49" font-weight="900">“KING KILLER”</text>
  <text x="36" y="186" fill="#f7f8fb" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="49" font-weight="900">HECKERT</text>
  <text x="36" y="208" fill="#aab2c2" font-family="Arial, Helvetica, sans-serif" font-size="15">Professional Bare-Knuckle Fighter · BKFC Middleweight · St. Petersburg, FL</text>
  <g filter="url(#shadow)">
    <rect x="36" y="248" width="209" height="98" rx="6" fill="#1a1f2b" stroke="#303849"/>
    <rect x="255" y="248" width="210" height="98" rx="6" fill="#1a1f2b" stroke="#303849"/>
    <rect x="475" y="248" width="209" height="98" rx="6" fill="#1a1f2b" stroke="#303849"/>
  </g>
  <text x="140" y="295" text-anchor="middle" fill="#f7f8fb" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34">2-1</text>
  <text x="140" y="330" text-anchor="middle" fill="#aab2c2" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="5">BKFC PRO RECORD</text>
  <text x="360" y="295" text-anchor="middle" fill="#ff1630" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34">2</text>
  <text x="360" y="330" text-anchor="middle" fill="#aab2c2" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="5">WINS BY KNOCKOUT</text>
  <text x="580" y="295" text-anchor="middle" fill="#f7f8fb" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34">27K+</text>
  <text x="580" y="330" text-anchor="middle" fill="#aab2c2" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="5">INSTAGRAM FOLLOWERS</text>
  <text x="36" y="381" fill="#aab2c2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-style="italic">Every win on my record ended with someone on the canvas. Put your brand in the corner.</text>
</svg>
